<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#14532d" />
  <title>Shane's Pickleball Playbook</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">Personal Pickleball Notebook</p>
      <h1>Shane's Pickleball Playbook</h1>
      <p class="subhead">Search notes, save reminders, and keep your favorite pickleball videos in one simple place.</p>
    </header>

    <section class="panel search-panel">
      <label for="searchInput" class="section-label">Search</label>
      <input id="searchInput" type="search" placeholder="Search notes and videos..." autocomplete="off" />
      <p id="searchStatus" class="hint"></p>
    </section>

    <section class="panel reminder-panel">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Today's Reminder</p>
          <h2>What I want to remember today</h2>
        </div>
      </div>
      <textarea id="todayReminder" rows="5" placeholder="Example: Split step before opponent contact. Stay low. Watch the ball to contact."></textarea>
      <p class="hint">Auto-saves on this device.</p>
    </section>

    <section id="sections" class="sections"></section>
  </main>

  <template id="sectionTemplate">
    <section class="panel playbook-section">
      <button class="section-toggle" type="button">
        <span class="section-title"></span>
        <span class="chevron">⌄</span>
      </button>
      <div class="section-body">
        <div class="notes-block">
          <div class="block-header">
            <h3>Notes</h3>
            <button class="small-button add-note" type="button">+ Add Note</button>
          </div>
          <div class="notes-list"></div>
        </div>

        <div class="videos-block">
          <div class="block-header">
            <h3>Videos</h3>
          </div>
          <form class="video-form">
            <input class="video-title" type="text" placeholder="Video title" />
            <input class="video-url" type="url" placeholder="YouTube or video link" />
            <button type="submit">Add Link</button>
          </form>
          <div class="upload-row">
            <label class="file-label">
              Upload Video
              <input class="video-upload" type="file" accept="video/*" />
            </label>
            <p class="hint">Large videos may not save on all phones. YouTube links are best.</p>
          </div>
          <div class="videos-list"></div>
        </div>
      </div>
    </section>
  </template>

  <script src="script.js"></script>
</body>
</html>

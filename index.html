<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#163d2f" />
  <title>Shane's Pickleball Notebook</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="hero-icon" aria-hidden="true">
        <img src="icon-192.png" alt="Pickleball paddle app icon" />
      </div>
      <div>
        <p class="eyebrow">Pickleball Notes</p>
        <h1>Shane's Pickleball Notebook</h1>
        <p class="subhead">Simple reminders, editable notes, and video links for the parts of your game that matter most.</p>
      </div>
    </header>

    <section class="card focus-card">
      <h2>Today's Reminder</h2>
      <p class="hint">Use this for your one main focus before you play.</p>
      <textarea id="todayReminder" placeholder="Example: Split step before every shot. Stay low. Watch the ball to contact."></textarea>
    </section>

    <section id="sections" class="sections"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
